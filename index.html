<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positive Thought Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1><span>✨</span>Daily Positive Thought</h1>

    <div class="card">
      <p id="thought">Click the button below for your daily dose of inspiration!</p>
    </div>

    <button id="generate">Generate Thought</button>

    <footer>Powered by Positive Thinking 💛</footer>

    <!-- popup.js must be at the bottom so DOM elements exist before the script runs -->
    <script src="popup.js"></script>
  </body>
</html>
